<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="IMPERA Remastered — Tarayıcı tabanlı büyük strateji oyunu"
    >

    <meta name="theme-color" content="#070b12">

    <title>IMPERA Remastered</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="background"></div>

    <!-- ANA MENÜ -->
    <main
        id="menuScreen"
        class="menu-screen"
    >

        <section class="hero">

            <p class="eyebrow">
                GLOBAL GRAND STRATEGY
            </p>

            <h1>IMPERA</h1>

            <p class="subtitle">
                Dünyanın kaderini değiştir.
            </p>

        </section>

        <section class="menu-panel">

            <button
                id="newGame"
                class="menu-button primary"
                type="button"
            >
                Yeni Oyun
            </button>

            <button
                id="continueGame"
                class="menu-button"
                type="button"
            >
                Devam Et
            </button>

            <button
                id="settings"
                class="menu-button"
                type="button"
            >
                Ayarlar
            </button>

            <button
                id="credits"
                class="menu-button"
                type="button"
            >
                Yapımcılar
            </button>

        </section>

        <footer>
            Alpha 0.1 • Impera Remastered
        </footer>

    </main>

    <!-- SENARYO SEÇİM PENCERESİ -->
    <div
        id="gameModal"
        class="modal hidden"
        aria-hidden="true"
    >

        <div
            class="modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="scenarioTitle"
        >

            <button
                id="closeModal"
                class="close-button"
                type="button"
                aria-label="Kapat"
            >
                ×
            </button>

            <p class="eyebrow">
                YENİ OYUN
            </p>

            <h2 id="scenarioTitle">
                Senaryo Seç
            </h2>

            <div class="scenario-grid">

                <button
                    class="scenario-card"
                    type="button"
                    data-scenario="1936"
                >
                    <strong>1936</strong>
                    <span>Savaşın Eşiğinde</span>
                </button>

                <button
                    class="scenario-card"
                    type="button"
                    data-scenario="1914"
                >
                    <strong>1914</strong>
                    <span>Büyük Savaş</span>
                </button>

                <button
                    class="scenario-card"
                    type="button"
                    data-scenario="modern"
                >
                    <strong>Günümüz</strong>
                    <span>Yeni Dünya Düzeni</span>
                </button>

            </div>

        </div>

    </div>

    <!-- DÜNYA HARİTASI VE ÜLKE SEÇİMİ -->
    <section
        id="worldScreen"
        class="world-screen hidden"
        aria-hidden="true"
    >

        <header class="world-header">

            <button
                id="backToMenu"
                class="back-button"
                type="button"
            >
                ← Ana Menü
            </button>

            <div class="world-title">

                <p class="eyebrow">
                    ÜLKE SEÇİMİ
                </p>

                <h2>
                    Dünya Haritası
                </h2>

                <p id="selectedScenario">
                    Senaryo: 1936
                </p>

            </div>

        </header>

        <div class="world-layout">

            <div class="map-container">

                <object
                    id="worldMap"
                    type="image/svg+xml"
                    data="images/world-map.svg"
                    aria-label="IMPERA dünya haritası"
                >
                    Tarayıcınız SVG dünya haritasını görüntüleyemiyor.
                </object>

            </div>

            <aside
                id="countryPanel"
                class="country-panel"
            >

                <p class="eyebrow">
                    SEÇİLEN ÜLKE
                </p>

                <h3 id="countryName">
                    Bir ülke seç
                </h3>

                <p id="countryCode">
                    Haritadaki ülkelere dokun.
                </p>

                <div class="country-details">

                    <div class="country-detail-row">
                        <span>ISO Kodu</span>
                        <strong id="countryIso">—</strong>
                    </div>

                    <div class="country-detail-row">
                        <span>Kıta</span>
                        <strong id="countryContinent">—</strong>
                    </div>

                    <div class="country-detail-row">
                        <span>Nüfus</span>
                        <strong id="countryPopulation">—</strong>
                    </div>

                    <div class="country-detail-row">
                        <span>Ekonomi</span>
                        <strong id="countryGdp">—</strong>
                    </div>

                </div>

                <button
                    id="startCountry"
                    class="start-country-button"
                    type="button"
                    disabled
                >
                    Bu Ülkeyle Başla
                </button>

            </aside>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
