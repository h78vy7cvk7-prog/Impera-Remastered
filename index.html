<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>IMPERA Remastered</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="background"></div>

    <main class="menu-screen">

        <section class="hero">

            <p class="eyebrow">
                GLOBAL GRAND STRATEGY
            </p>

            <h1>IMPERA</h1>

            <p class="subtitle">
                Dünyanın kaderini değiştir.
            </p>

        </section>

        <section class="menu-panel">

            <button
                id="newGame"
                class="menu-button primary"
            >
                Yeni Oyun
            </button>

            <button
                id="continueGame"
                class="menu-button"
            >
                Devam Et
            </button>

            <button
                id="settings"
                class="menu-button"
            >
                Ayarlar
            </button>

            <button
                id="credits"
                class="menu-button"
            >
                Yapımcılar
            </button>

        </section>

        <footer>
            Alpha 0.1 • Impera Remastered
        </footer>

    </main>

    <div
        id="gameModal"
        class="modal hidden"
        aria-hidden="true"
    >

        <div class="modal-card">

            <button
                id="closeModal"
                class="close-button"
                aria-label="Kapat"
            >
                ×
            </button>

            <p class="eyebrow">
                YENİ OYUN
            </p>

            <h2>Senaryo Seç</h2>

            <div class="scenario-grid">

                <button
                    class="scenario-card"
                    data-scenario="1936"
                >
                    <strong>1936</strong>
                    <span>Savaşın Eşiğinde</span>
                </button>

                <button
                    class="scenario-card"
                    data-scenario="1914"
                >
                    <strong>1914</strong>
                    <span>Büyük Savaş</span>
                </button>

                <button
                    class="scenario-card"
                    data-scenario="modern"
                >
                    <strong>Günümüz</strong>
                    <span>Yeni Dünya Düzeni</span>
                </button>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
